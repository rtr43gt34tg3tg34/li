<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Liam's Websites</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0c0c0b;--white:#fff;--sand:#faf9f7;--sand2:#f0eeea;
      --border:#e4e1db;--mid:#999690;--dim:#706d68;
      --blue:#2563eb;--blue2:#1d4ed8;--bluetint:#eef2ff;
      --green:#15803d;--greentint:#f0fdf4;--greenborder:#86efac;
      --red:#dc2626;--redtint:#fef2f2;--redborder:#fecaca;
      --r:10px;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);display:flex;flex-direction:column}

    /* LOGIN */
    #loginScreen{flex:1;display:flex;align-items:center;justify-content:center}
    .lcard{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:2.5rem;width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.07)}
    .lcard h1{font-size:1.3rem;font-weight:700;margin-bottom:.3rem}
    .lcard p{font-size:.83rem;color:var(--dim);margin-bottom:1.75rem}
    .lcard input{width:100%;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.7rem 1rem;border-radius:var(--r);border:1.5px solid var(--border);outline:none;margin-bottom:.75rem;background:var(--sand);transition:border-color .15s}
    .lcard input:focus{border-color:var(--blue);background:var(--white)}
    .lcard button{width:100%;padding:.85rem;border-radius:999px;background:var(--blue);color:var(--white);border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
    .lcard button:hover{background:var(--blue2)}
    .lerr{color:var(--red);font-size:.82rem;margin-top:.6rem;display:none}

    /* MAIN */
    #mainScreen{flex:1;display:none;flex-direction:column;overflow:hidden}
    .topbar{height:50px;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;flex-shrink:0}
    .topbar h2{font-size:.9rem;font-weight:600}
    .topbar-right{display:flex;align-items:center;gap:.75rem}
    .live-pill{display:flex;align-items:center;gap:5px;font-size:.75rem;opacity:.7}
    .live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80}
    .logout-btn{background:none;border:1px solid #333;color:#aaa;font-size:.75rem;padding:.3rem .7rem;border-radius:999px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .logout-btn:hover{border-color:#666;color:var(--white)}

    /* PANELS */
    .panels{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden}

    /* CHAT LIST */
    .list-panel{border-right:1px solid var(--border);background:var(--white);display:flex;flex-direction:column;overflow:hidden}
    .list-head{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .list-head span{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mid)}
    .list-count{background:var(--blue);color:var(--white);font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:999px}
    .list-inner{flex:1;overflow-y:auto}
    .ci{padding:.8rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
    .ci:hover{background:var(--sand)}
    .ci.active{background:var(--bluetint);border-left:3px solid var(--blue)}
    .ci-top{display:flex;align-items:center;justify-content:space-between;gap:.4rem;margin-bottom:2px}
    .ci-name{font-size:.875rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ci-badge{background:var(--red);color:var(--white);font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:999px;flex-shrink:0}
    .ci-status{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
    .ci-status.open{background:#f0f9ff;color:#0369a1}
    .ci-status.claimed{background:var(--greentint);color:var(--green)}
    .ci-status.closed{background:var(--sand2);color:var(--mid)}
    .ci-email{font-size:.72rem;color:var(--mid);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ci-last{font-size:.75rem;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .empty-list{padding:2rem 1rem;text-align:center;color:var(--mid);font-size:.85rem;line-height:1.6}

    /* CHAT WINDOW */
    .chat-win{display:flex;flex-direction:column;overflow:hidden;background:var(--sand)}
    .no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mid);font-size:.9rem;gap:.5rem}
    .no-chat span{font-size:2.5rem}

    .win-head{padding:.8rem 1.25rem;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-shrink:0}
    .win-info{min-width:0;flex:1}
    .win-name{font-size:.95rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .win-email{font-size:.75rem;color:var(--mid)}
    .win-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .status-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;text-transform:uppercase}
    .status-badge.open{background:#f0f9ff;color:#0369a1}
    .status-badge.claimed{background:var(--greentint);color:var(--green)}
    .status-badge.closed{background:var(--sand2);color:var(--mid)}
    .act-btn{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;padding:.3rem .8rem;border-radius:999px;cursor:pointer;border:none;white-space:nowrap;transition:opacity .15s}
    .act-btn:hover{opacity:.8}
    .act-btn.claim{background:var(--greentint);color:var(--green);border:1px solid var(--greenborder)}
    .act-btn.close{background:var(--redtint);color:var(--red);border:1px solid var(--redborder)}

    .msgs-area{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
    .bwrap{display:flex;width:100%}
    .bwrap.user{justify-content:flex-start}
    .bwrap.admin{justify-content:flex-end}
    .bouter{display:flex;flex-direction:column;max-width:72%}
    .bwrap.user .bouter{align-items:flex-start}
    .bwrap.admin .bouter{align-items:flex-end}
    .bubble{padding:.55rem .85rem;border-radius:14px;font-size:.875rem;line-height:1.5;word-break:break-word}
    .bwrap.user .bubble{background:var(--white);color:var(--ink);border:1px solid var(--border);border-bottom-left-radius:4px}
    .bwrap.admin .bubble{background:var(--blue);color:var(--white);border-bottom-right-radius:4px}
    .btime{font-size:.62rem;color:var(--mid);margin-top:3px}
    .sysmsg{text-align:center;font-size:.72rem;color:var(--mid);padding:.3rem;font-style:italic;width:100%}

    .input-area{background:var(--white);border-top:1px solid var(--border);padding:.75rem 1rem;flex-shrink:0}
    .input-toolbar{display:flex;gap:.5rem;margin-bottom:.5rem}
    .betterup-btn{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;padding:.3rem .85rem;border-radius:999px;cursor:pointer;border:1.5px solid var(--blue);background:var(--bluetint);color:var(--blue);transition:all .15s}
    .betterup-btn:hover:not(:disabled){background:var(--blue);color:var(--white)}
    .betterup-btn:disabled{opacity:.5;cursor:not-allowed}
    .input-row{display:flex;gap:.5rem;align-items:center}
    .reply-input{flex:1;font-family:'DM Sans',sans-serif;font-size:.875rem;padding:.6rem .9rem;border-radius:999px;border:1.5px solid var(--border);outline:none;background:var(--sand);transition:border-color .15s}
    .reply-input:focus{border-color:var(--blue);background:var(--white)}
    .reply-send{background:var(--blue);color:var(--white);border:none;border-radius:50%;width:38px;height:38px;min-width:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .15s}
    .reply-send:hover{background:var(--blue2)}
    .closed-note{text-align:center;padding:.9rem;font-size:.83rem;color:var(--mid);border-top:1px solid var(--border);background:var(--sand2)}

    /* CLAIM MODAL */
    .overlay{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .modal{background:var(--white);border-radius:16px;padding:2rem;width:340px;box-shadow:0 16px 60px rgba(0,0,0,.15)}
    .modal h3{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
    .modal p{font-size:.85rem;color:var(--dim);margin-bottom:1.1rem}
    .modal input{width:100%;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.65rem .9rem;border-radius:var(--r);border:1.5px solid var(--border);outline:none;margin-bottom:.9rem;background:var(--sand)}
    .modal input:focus{border-color:var(--blue);background:var(--white)}
    .modal-btns{display:flex;gap:.6rem}
    .modal-ok{flex:1;padding:.75rem;border-radius:999px;background:var(--green);color:var(--white);border:none;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:700;cursor:pointer}
    .modal-ok:hover{background:#166534}
    .modal-cancel{padding:.75rem 1rem;border-radius:999px;background:var(--sand2);color:var(--ink);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer}

    @media(max-width:700px){
      .panels{grid-template-columns:1fr}
      .list-panel{display:none}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lcard">
    <div style="font-size:2rem;margin-bottom:.75rem">🔒</div>
    <h1>Admin Panel</h1>
    <p>Liam's Websites — Support Dashboard</p>
    <input type="password" id="pwInput" placeholder="Enter password"/>
    <button id="loginBtn">Sign In</button>
    <div class="lerr" id="loginErr">Wrong password. Try again.</div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="topbar">
    <h2>💬 Support Chats</h2>
    <div class="topbar-right">
      <div class="live-pill"><div class="live-dot"></div>Live</div>
      <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>
  </div>
  <div class="panels">
    <div class="list-panel">
      <div class="list-head">
        <span>Conversations</span>
        <span class="list-count" id="chatCount">0</span>
      </div>
      <div class="list-inner" id="listInner">
        <div class="empty-list">No chats yet.<br/>They appear here when visitors open the chat.</div>
      </div>
    </div>
    <div class="chat-win" id="chatWin">
      <div class="no-chat"><span>💬</span>Select a conversation</div>
    </div>
  </div>
</div>

<!-- CLAIM MODAL -->
<div class="overlay" id="claimOverlay">
  <div class="modal">
    <h3>Claim This Ticket</h3>
    <p>Enter your name so the customer knows who is helping them.</p>
    <input type="text" id="claimName" placeholder="Your name (e.g. Liam)" maxlength="40"/>
    <div class="modal-btns">
      <button class="modal-cancel" id="claimCancelBtn">Cancel</button>
      <button class="modal-ok" id="claimOkBtn">Claim Ticket</button>
    </div>
  </div>
</div>

<script>
(function() {
  var ws = null;
  var authed = false;
  var activeSession = null;
  var metas = {}; // sessionId -> chatMeta
  var claimingSid = null;

  function $(id) { return document.getElementById(id); }
  function wsUrl() { return (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host; }

  // ── LOGIN ──────────────────────────────────────────────────────────────────
  function doLogin() {
    var pw  = $('pwInput').value;
    var err = $('loginErr');
    err.style.display = 'none';
    if (!pw) return;

    if (ws) { ws.close(); ws = null; }
    ws = new WebSocket(wsUrl());

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'admin_join', password: pw }));
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch { return; }

      if (msg.type === 'auth_fail') {
        err.style.display = 'block';
        ws.close(); ws = null;
        return;
      }
      if (msg.type === 'auth_ok') {
        authed = true;
        $('loginScreen').style.display = 'none';
        $('mainScreen').style.display  = 'flex';
        renderList(msg.chats);
        return;
      }
      if (msg.type === 'chat_list')     { renderList(msg.chats); return; }
      if (msg.type === 'new_msg')       { onNewMsg(msg); return; }
      if (msg.type === 'chat_history')  { renderHistory(msg); return; }
      if (msg.type === 'ticket_updated'){ onTicketUpdated(msg.chatMeta); return; }
      if (msg.type === 'ticket_deleted'){ onTicketDeleted(msg.sessionId); return; }
    };

    ws.onclose = function() {
      if (authed) setTimeout(function() { location.reload(); }, 2000);
    };
    ws.onerror = function() {
      err.textContent = 'Connection error.';
      err.style.display = 'block';
      if (ws) { ws.close(); ws = null; }
    };
  }

  function doLogout() {
    authed = false;
    if (ws) { ws.close(); ws = null; }
    $('loginScreen').style.display = 'flex';
    $('mainScreen').style.display  = 'none';
    $('pwInput').value = '';
  }

  // ── CHAT LIST ──────────────────────────────────────────────────────────────
  function statusLabel(m) {
    if (m.status === 'claimed') return 'Claimed: ' + (m.claimedBy || 'Admin');
    if (m.status === 'closed')  return 'Closed';
    return 'Open';
  }

  function renderList(chats) {
    chats = chats || [];
    chats.forEach(function(c) { if (c) metas[c.id] = c; });
    $('chatCount').textContent = chats.length;
    var inner = $('listInner');
    if (!chats.length) {
      inner.innerHTML = '<div class="empty-list">No chats yet.<br/>They appear here when visitors open the chat.</div>';
      return;
    }
    inner.innerHTML = chats.map(function(c) {
      if (!c) return '';
      var isActive = activeSession === c.id;
      return '<div class="ci' + (isActive ? ' active' : '') + '" data-sid="' + c.id + '">' +
        '<div class="ci-top">' +
          '<div class="ci-name">' + esc(c.name) + '</div>' +
          '<span class="ci-status ' + c.status + '">' + statusLabel(c) + '</span>' +
          (c.unread > 0 && c.id !== activeSession ? '<span class="ci-badge">' + c.unread + '</span>' : '') +
        '</div>' +
        '<div class="ci-email">' + esc(c.email || 'No email') + '</div>' +
        '<div class="ci-last">' + esc(c.lastMsg ? c.lastMsg.text : 'No messages yet') + '</div>' +
      '</div>';
    }).join('');
    // attach click listeners
    inner.querySelectorAll('.ci').forEach(function(el) {
      el.addEventListener('click', function() { openChat(el.dataset.sid); });
    });
  }

  function openChat(sid) {
    activeSession = sid;
    // highlight
    document.querySelectorAll('.ci').forEach(function(el) {
      el.classList.toggle('active', el.dataset.sid === sid);
    });
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'admin_open', sessionId: sid }));
    }
  }

  // ── CHAT HISTORY ───────────────────────────────────────────────────────────
  function renderHistory(msg) {
    var meta   = msg.chatMeta || metas[msg.sessionId] || {};
    var closed = meta.status === 'closed';
    var claimed = meta.status === 'claimed';
    var win = $('chatWin');

    win.innerHTML =
      '<div class="win-head">' +
        '<div class="win-info">' +
          '<div class="win-name">' + esc(meta.name || 'Visitor') + '</div>' +
          '<div class="win-email">' + esc(meta.email || 'No email') + '</div>' +
        '</div>' +
        '<div class="win-actions">' +
          '<span class="status-badge ' + meta.status + '">' + statusLabel(meta) + '</span>' +
          (!closed && !claimed ? '<button class="act-btn claim" id="claimBtn">Claim</button>' : '') +
          (!closed ? '<button class="act-btn close" id="closeBtn">Close</button>' : '') +
        '</div>' +
      '</div>' +
      '<div class="msgs-area" id="msgsArea"></div>' +
      (closed
        ? '<div class="closed-note">This ticket is closed.</div>'
        : '<div class="input-area">' +
            '<div class="input-toolbar"><button class="betterup-btn" id="betterupBtn">✨ Better Up!</button></div>' +
            '<div class="input-row">' +
              '<input class="reply-input" id="replyInput" placeholder="Reply to ' + esc(meta.name || 'visitor') + '..." maxlength="500"/>' +
              '<button class="reply-send" id="replySendBtn">➤</button>' +
            '</div>' +
          '</div>');

    // Render history
    var area = $('msgsArea');
    if (!msg.history || !msg.history.length) {
      area.innerHTML = '<div class="sysmsg">No messages yet</div>';
    } else {
      msg.history.forEach(function(m) { addBubble(m.from, m.text, m.ts, false); });
      area.scrollTop = area.scrollHeight;
    }

    // Wire up buttons
    var claimBtn    = $('claimBtn');
    var closeBtn    = $('closeBtn');
    var betterupBtn = $('betterupBtn');
    var replyInput  = $('replyInput');
    var replySendBtn = $('replySendBtn');

    if (claimBtn) claimBtn.addEventListener('click', function() { openClaimModal(msg.sessionId); });
    if (closeBtn) closeBtn.addEventListener('click', function() { doClose(msg.sessionId); });
    if (betterupBtn) betterupBtn.addEventListener('click', doBetterUp);
    if (replyInput) {
      replyInput.focus();
      replyInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
      });
    }
    if (replySendBtn) replySendBtn.addEventListener('click', doSend);
  }

  // ── SEND ───────────────────────────────────────────────────────────────────
  function doSend() {
    var input = $('replyInput');
    if (!input) return;
    var text = input.value.trim();
    if (!text) return;
    if (!activeSession) return;
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'admin_msg', sessionId: activeSession, text: text }));
    addBubble('admin', text, Date.now(), true);
    input.value = '';
    input.focus();
  }

  // ── BETTER UP ─────────────────────────────────────────────────────────────
  async function doBetterUp() {
    var input = $('replyInput');
    var btn   = $('betterupBtn');
    if (!input || !input.value.trim()) { if (input) input.focus(); return; }
    var original = input.value.trim();
    btn.disabled = true;
    btn.textContent = '✨ Improving...';
    try {
      var res  = await fetch('/better-up', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: original }) });
      var data = await res.json();
      if (data.improved) {
        input.value = data.improved;
        input.style.borderColor = '#15803d';
        setTimeout(function() { input.style.borderColor = ''; }, 1200);
      } else {
        alert('Better Up failed: ' + (data.error || 'unknown'));
      }
    } catch(e) {
      alert('Better Up failed: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '✨ Better Up!';
      if (input) input.focus();
    }
  }

  // ── CLAIM ──────────────────────────────────────────────────────────────────
  function openClaimModal(sid) {
    claimingSid = sid;
    $('claimName').value = '';
    $('claimOverlay').classList.add('show');
    setTimeout(function() { $('claimName').focus(); }, 100);
  }
  function closeClaimModal() {
    $('claimOverlay').classList.remove('show');
    claimingSid = null;
  }
  function confirmClaim() {
    var name = $('claimName').value.trim();
    if (!name) { $('claimName').focus(); return; }
    if (!claimingSid || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'admin_claim', sessionId: claimingSid, claimedBy: name }));
    closeClaimModal();
  }

  // ── CLOSE ──────────────────────────────────────────────────────────────────
  function doClose(sid) {
    if (!confirm('Close this ticket? The customer will be notified and the chat will be deleted.')) return;
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'admin_close', sessionId: sid }));
  }

  // ── INCOMING EVENTS ────────────────────────────────────────────────────────
  function onNewMsg(msg) {
    if (!msg.chatMeta) return;
    metas[msg.sessionId] = msg.chatMeta;
    // update list item
    var item = document.querySelector('.ci[data-sid="' + msg.sessionId + '"]');
    if (item) {
      item.querySelector('.ci-last').textContent = msg.msg.text;
      var badge = item.querySelector('.ci-badge');
      if (msg.chatMeta.unread > 0 && msg.sessionId !== activeSession) {
        if (badge) badge.textContent = msg.chatMeta.unread;
        else item.querySelector('.ci-top').insertAdjacentHTML('beforeend', '<span class="ci-badge">' + msg.chatMeta.unread + '</span>');
      } else if (badge) badge.remove();
      item.parentElement.prepend(item);
    } else {
      renderList(Object.values(metas).sort(function(a,b) { return ((b.lastMsg||{}).ts||0) - ((a.lastMsg||{}).ts||0); }));
    }
    // append to open chat
    if (activeSession === msg.sessionId) addBubble(msg.msg.from, msg.msg.text, msg.msg.ts, true);
  }

  function onTicketUpdated(meta) {
    if (!meta) return;
    metas[meta.id] = meta;
    // update status badge in header if this chat is open
    if (activeSession === meta.id) {
      var badge = document.querySelector('.status-badge');
      if (badge) { badge.className = 'status-badge ' + meta.status; badge.textContent = statusLabel(meta); }
      var claimBtn = $('claimBtn');
      if (claimBtn && (meta.status === 'claimed' || meta.status === 'closed')) claimBtn.remove();
    }
    renderList(Object.values(metas).sort(function(a,b) { return ((b.lastMsg||{}).ts||0) - ((a.lastMsg||{}).ts||0); }));
  }

  function onTicketDeleted(sid) {
    delete metas[sid];
    var item = document.querySelector('.ci[data-sid="' + sid + '"]');
    if (item) item.remove();
    $('chatCount').textContent = Object.keys(metas).length;
    if (activeSession === sid) {
      activeSession = null;
      $('chatWin').innerHTML = '<div class="no-chat"><span>💬</span>Select a conversation</div>';
    }
    var inner = $('listInner');
    if (inner && !inner.querySelector('.ci')) {
      inner.innerHTML = '<div class="empty-list">No chats yet.<br/>They appear here when visitors open the chat.</div>';
    }
  }

  // ── BUBBLES ────────────────────────────────────────────────────────────────
  function addBubble(from, text, ts, scroll) {
    var area = $('msgsArea');
    if (!area) return;
    if (from === 'system') {
      area.insertAdjacentHTML('beforeend', '<div class="sysmsg">' + esc(text) + '</div>');
    } else {
      var t = ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      var side = from === 'admin' ? 'admin' : 'user';
      area.insertAdjacentHTML('beforeend',
        '<div class="bwrap ' + side + '">' +
          '<div class="bouter">' +
            '<div class="bubble">' + esc(text) + '</div>' +
            '<div class="btime">' + (from === 'admin' ? 'You · ' : '') + t + '</div>' +
          '</div>' +
        '</div>');
    }
    if (scroll) area.scrollTop = area.scrollHeight;
  }

  // ── UTILS ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── WIRE UP ────────────────────────────────────────────────────────────────
  $('loginBtn').addEventListener('click', doLogin);
  $('pwInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  $('logoutBtn').addEventListener('click', doLogout);
  $('claimCancelBtn').addEventListener('click', closeClaimModal);
  $('claimOkBtn').addEventListener('click', confirmClaim);
  $('claimName').addEventListener('keydown', function(e) { if (e.key === 'Enter') confirmClaim(); });
  $('claimOverlay').addEventListener('click', function(e) { if (e.target === $('claimOverlay')) closeClaimModal(); });

})();
</script>
</body>
</html>
